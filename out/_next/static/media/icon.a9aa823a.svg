<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background -->
  <circle cx="16" cy="16" r="16" fill="#0F0A1A"/>

  <!-- 6 pie segments (60° each), clockwise from 3 o'clock -->
  <!-- Purple -->
  <path d="M16,16 L31,16 A15,15 0 0,1 23.5,28.99 Z" fill="#7B2FBE"/>
  <!-- Yellow/Amber -->
  <path d="M16,16 L23.5,28.99 A15,15 0 0,1 8.5,28.99 Z" fill="#F59E0B"/>
  <!-- Green -->
  <path d="M16,16 L8.5,28.99 A15,15 0 0,1 1,16 Z" fill="#10B981"/>
  <!-- Red -->
  <path d="M16,16 L1,16 A15,15 0 0,1 8.5,3.01 Z" fill="#EF4444"/>
  <!-- Blue -->
  <path d="M16,16 L8.5,3.01 A15,15 0 0,1 23.5,3.01 Z" fill="#3B82F6"/>
  <!-- Pink -->
  <path d="M16,16 L23.5,3.01 A15,15 0 0,1 31,16 Z" fill="#EC4899"/>

  <!-- Dark separator lines between segments -->
  <g stroke="#0F0A1A" stroke-width="1.2" stroke-linecap="round">
    <line x1="16" y1="16" x2="31" y2="16"/>
    <line x1="16" y1="16" x2="23.5" y2="28.99"/>
    <line x1="16" y1="16" x2="8.5" y2="28.99"/>
    <line x1="16" y1="16" x2="1" y2="16"/>
    <line x1="16" y1="16" x2="8.5" y2="3.01"/>
    <line x1="16" y1="16" x2="23.5" y2="3.01"/>
  </g>

  <!-- Outer gold ring -->
  <circle cx="16" cy="16" r="14.5" fill="none" stroke="#F59E0B" stroke-width="1.5"/>

  <!-- Center hub -->
  <circle cx="16" cy="16" r="5.5" fill="#0F0A1A"/>
  <circle cx="16" cy="16" r="4.5" fill="none" stroke="#F59E0B" stroke-width="0.8"/>
  <circle cx="16" cy="16" r="2.5" fill="#F59E0B"/>
  <circle cx="16" cy="16" r="1" fill="#0F0A1A"/>
</svg>
